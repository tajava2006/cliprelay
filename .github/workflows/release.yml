name: Release Desktop

# 자동 업데이트 시그닝 키 최초 1회 세팅:
#
#   1) 로컬에서 키페어 생성:
#        cd app && pnpm tauri signer generate -w ~/.tauri/cliprelay.key
#
#   2) 출력된 public key 를 app/src-tauri/tauri.conf.json 의
#      plugins.updater.pubkey 값으로 붙여넣기 (커밋).
#
#   3) GitHub repo Settings → Secrets and variables → Actions 에 추가:
#        - TAURI_SIGNING_PRIVATE_KEY           = ~/.tauri/cliprelay.key 의 내용 전체
#        - TAURI_SIGNING_PRIVATE_KEY_PASSWORD  = 키 생성 시 입력한 패스워드 (없으면 빈 값)
#
#   4) 첫 릴리즈 후 GitHub 의 Releases 페이지에서 "draft" 를 publish 해야
#      releases/latest/download/latest.json 가 활성화됨.

on:
  push:
    tags:
      - 'desktop/v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#desktop/v}" >> $GITHUB_OUTPUT

      - name: Patch version in tauri.conf.json
        shell: bash
        run: |
          cd app/src-tauri
          sed -i.bak 's/"version": ".*"/"version": "${{ steps.version.outputs.version }}"/' tauri.conf.json
          rm -f tauri.conf.json.bak

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: desktop-rust-${{ matrix.target }}-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: desktop-rust-${{ matrix.target }}-

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Desktop v${{ steps.version.outputs.version }}'
          releaseBody: 'See the assets below to download for your platform.'
          releaseDraft: true
          prerelease: false
          # 개별 job에서 latest.json 올리지 않음 — merge-updater-json job에서 통합 생성
          includeUpdaterJson: false

  merge-updater-json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Generate merged latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/assets
          gh release download "$TAG" --repo "$REPO" --dir /tmp/assets --pattern "*.sig" 2>/dev/null || true
          ls /tmp/assets/

          python3 - <<'PYEOF'
          import json, os, glob, re

          assets_dir = "/tmp/assets"
          tag        = os.environ["TAG"]
          repo       = os.environ["REPO"]
          # "desktop/v1.2.3" → "1.2.3"
          version    = re.sub(r"^desktop/v", "", tag)
          base_url   = f"https://github.com/{repo}/releases/download/{tag}"

          # Tauri 번들 파일명 패턴 → Tauri updater platform 키 매핑
          PLATFORM_MAP = [
              (r"_aarch64\.app\.tar\.gz$",  "darwin-aarch64"),
              (r"_x64\.app\.tar\.gz$",      "darwin-x86_64"),
              (r"_x86_64\.AppImage$",       "linux-x86_64"),
              (r"_x64-setup\.exe$",         "windows-x86_64"),
              (r"_x86_64-setup\.exe$",      "windows-x86_64"),
          ]

          platforms = {}
          for sig_path in glob.glob(f"{assets_dir}/*.sig"):
              artifact = os.path.basename(sig_path[:-4])  # .sig 제거
              with open(sig_path) as f:
                  signature = f.read().strip()
              for pattern, platform_key in PLATFORM_MAP:
                  if re.search(pattern, artifact):
                      platforms[platform_key] = {
                          "signature": signature,
                          "url": f"{base_url}/{artifact}",
                      }
                      break

          if not platforms:
              raise SystemExit("ERROR: No platform signatures found in release assets")

          latest = {
              "version": version,
              "notes": "",
              "pub_date": "",
              "platforms": platforms,
          }
          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          print(json.dumps(latest, indent=2))
          PYEOF

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" /tmp/latest.json --clobber --repo "${{ github.repository }}"
